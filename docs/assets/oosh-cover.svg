    <text x="416" y="214" fill="#8EECE2" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">[default] . -&gt; children() |&gt; where(type == "file")</text>
    <text x="416" y="252" fill="#73D9FF" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">|&gt; each([:it | it -&gt; name]) |&gt; take(5)</text>
    <text x="416" y="290" fill="#FFD49A" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">plugin load build/oosh_sample_plugin.dylib</text>
    <text x="416" y="328" fill="#F4FAFF" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">env() -&gt; HOME     shell() -&gt; plugins     proc() -&gt; pid</text>
    <text x="416" y="366" fill="#8EECE2" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">class Node extends File, Json do ... endclass</text>
    <text x="416" y="404" fill="#73D9FF" font-family="'SFMono-Regular', 'Menlo', 'Consolas', monospace" font-size="22">text("%s") -&gt; print($(pwd))</text>
    <rect x="416" y="428" width="11" height="24" rx="3" fill="#8EECE2">
      <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

