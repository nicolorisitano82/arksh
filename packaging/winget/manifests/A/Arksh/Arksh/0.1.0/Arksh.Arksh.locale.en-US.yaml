ShortDescription: ARKsh — Archetype Shell, typed object-aware shell
Description: >
  arksh is an interactive shell and scripting language for Linux, macOS and
  Windows. It provides classic POSIX-compatible shell execution while adding
  a typed, object-aware runtime: filesystem resources, processes, numbers,
  strings, lists, dictionaries and command output are first-class typed
  values queryable through member-access chains (->) and object pipelines (|>).
