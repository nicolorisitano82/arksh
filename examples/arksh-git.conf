# Git-aware prompt example.
# Loads the git prompt plugin and shows "branch + state" when inside a repo.

theme=default
left=userhost,cwd,git,plugins
right=status,os,date,time
separator= | 
use_color=1
plugin=git-prompt-plugin
color.userhost=green
color.cwd=cyan
color.git=yellow
color.plugins=blue
color.status=yellow
color.os=magenta
color.date=blue
color.time=yellow
